name: local
registry:
  tavily:
    type: remote
    description: "Provides seamless interaction with the tavily-search and tavily-extract tools, real-time web search capabilities through the tavily-search tool and Intelligent data extraction from web pages via the tavily-extract tool."  
    title: "Tavily Search, Exract, Research MCP"
    remote:  
      url: "https://mcp.tavily.com/mcp"
      transport_type: http
      headers:
        Authorization: "Bearer ${TAVILY_API_KEY}"
    secrets:  
      - name: "tavily.api_token"
        env: "TAVILY_API_KEY"
        example: "your_tavily_api_token_here"

  deepwiki:
    type: remote  
    description: "Explore GitHub repositories to learn about libraries, frameworks, and tools."  
    title: "DeepWiki - Repository insights and research MCP"
    remote:  
      url: "https://mcp.deepwiki.com/mcp"
      transport_type: http

  context7:  
    type: remote  
    description: "Provides access to the Context7 API, allows access documentation for libraries, websites and software."  
    title: "Context7 - Documentation lookup and research MCP"
    remote:  
      url: "https://mcp.context7.com/mcp"  
      transport_type: http
      headers:
        Authorization: "Bearer ${CONTEXT7_API_KEY}"
    secrets:
      - name: "context7.api_key"   # key used in .env file  
        env: "CONTEXT7_API_KEY"               # name used in ${...} expansion  
        example: "your_context7_api_key_here"

  github:
    type: remote
    description: "Provides read-only access to GitHub repositories for information gathering(issues, pull requests, commits, files, etc.)."
    title: "GitHub - Read-Only MCP"
    remote:
      url: "https://api.githubcopilot.com/mcp/x/all/readonly"
      transport_type: http
      headers:
        Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"
    secrets:
      - name: "github.token"   # key used in .env file
        env: "GITHUB_PERSONAL_ACCESS_TOKEN"               # name used in ${...} expansion
        example: "your_github_personal_access_token_here"

  fetch:
    description: Lightweight server for web content fetching(limited to publically accessible web pages, no authentication or dynamic content).
    title: Fetch - Web Content MCP
    type: server
    image: mcp/fetch@sha256:d9907377c03da91e49cf02c3dd6f0f83d1e0183e1222850f92595089f2c9a59d

