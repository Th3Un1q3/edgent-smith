name: local
registry:
  tavily:  
    type: remote
    description: "Provides seamless interaction with the tavily-search and tavily-extract tools, real-time web search capabilities through the tavily-search tool and Intelligent data extraction from web pages via the tavily-extract tool."  
    remote:  
      url: "https://mcp.tavily.com/mcp?tavilyApiKey=${TAVILY_API_KEY}"  
      transport_type: http
    secrets:  
      - name: "tavily.api_token"   # key used in .env file  
        env: "TAVILY_API_TOKEN"               # name used in ${...} expansion  
        example: "your_tavily_api_token_here"

  deepwiki:  
    type: remote  
    description: "Allows effectively explore github repositories to learn about libraries, frameworks, and tools."  
    remote:  
      url: "https://mcp.deepwiki.com/mcp"  
      transport_type: http

  context7:  
    type: remote  
    description: "Provides access to the Context7 API, allows access documentation for libraries, websites and software."  
    remote:  
      url: "https://mcp.context7.com/mcp"  
      transport_type: http
    headers:
      Authorization: "Bearer ${CONTEXT7_API_KEY}"
    secrets:
      - name: "context7.api_key"   # key used in .env file  
        env: "CONTEXT7_API_KEY"               # name used in ${...} expansion  
        example: "your_context7_api_key_here"
