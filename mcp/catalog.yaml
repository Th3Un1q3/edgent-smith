name: local
registry:
  tavily:
    type: remote
    description: "Web search engine and content extraction. Provides tavily-search for real-time web queries (news, research, general knowledge) and tavily-extract for fetching and parsing webpage content."  
    title: "Tavily - Web Search & Content Extraction MCP"
    remote:  
      url: "https://mcp.tavily.com/mcp"
      transport_type: http
      headers:
        Authorization: "Bearer ${TAVILY_API_KEY}"
    secrets:  
      - name: "tavily.api_token"
        env: "TAVILY_API_KEY"
        example: "your_tavily_api_token_here"

  deepwiki:
    type: remote  
    description: "Search and explore software documentation and developer resources. Queries a curated index of wikis, documentation sites, and knowledge bases for technical reference information."  
    title: "DeepWiki - Documentation & Knowledge Search MCP"
    remote:  
      url: "https://mcp.deepwiki.com/mcp"
      transport_type: http

  serena:
    type: remote
    description: "IDE-like code intelligence for large codebases. Provides symbol search, cross-references, file tree browsing, dependency graphs, and semantic code navigation."
    title: "Serena - Symbol Search & Code Intelligence MCP"
    remote:
      url: "http://serena:9121/mcp"
      transport_type: http

  context7:  
    type: remote  
    description: "Structured documentation lookup for programming languages, frameworks, and libraries. Retrieves official docs, APIs, changelogs, and usage examples from authoritative sources."
    title: "Context7 - Official Docs & API Reference Lookup MCP"
    remote:  
      url: "https://mcp.context7.com/mcp"  
      transport_type: http
      headers:
        Authorization: "Bearer ${CONTEXT7_API_KEY}"
    secrets:
      - name: "context7.api_key"   # key used in .env file  
        env: "CONTEXT7_API_KEY"               # name used in ${...} expansion  
        example: "your_context7_api_key_here"

  github:
    type: remote
    description: "Read-only GitHub API access. Browse repositories, search code and issues, view pull requests, commits, branches, diffs, file contents, and repository metadata."
    title: "GitHub - Read-Only Code & Issue Browser MCP"
    remote:
      url: "https://api.githubcopilot.com/mcp/x/all/readonly"
      transport_type: http
      headers:
        Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"
    secrets:
      - name: "github.token"   # key used in .env file
        env: "GITHUB_PERSONAL_ACCESS_TOKEN"               # name used in ${...} expansion
        example: "your_github_personal_access_token_here"

  fetch:
    description: "HTTP fetch tool for retrieving and parsing publicly available web page content. Handles HTML rendering, text extraction, and resource loading."
    title: "Fetch - Public Web Page Content Fetcher MCP"
    type: server
    image: mcp/fetch@sha256:d9907377c03da91e49cf02c3dd6f0f83d1e0183e1222850f92595089f2c9a59d

