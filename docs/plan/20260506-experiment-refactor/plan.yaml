      standalone shell scripts.
      check_labeler.sh: replicate the "Check labeler permission and rate limit"
      step — read ACTOR, REPO, MAX_RUNS, GH_TOKEN from the environment,
      verify collaborator permission via gh api, count recent workflow runs,
      and exit 1 if checks fail.
      check_queue_depth.sh: replicate the "Check queue depth after terminalization"
