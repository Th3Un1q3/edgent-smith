plan_id: 20260506-experiment-refactor
objective: >
  Rework the reusable experiment workflow around 5 specific concerns:
  (1) inline script extraction into Python subcommands and thin .sh helpers,
  (2) replace brainstorm agent with edge-architect and migrate all downstream
  consumers, (3) document local parity (BASELINE_ID, --local flag),
  (4) commit experiment specs at submit time so they survive session loss,
  (5) embed staleness metadata in baseline JSON and auto-re-bootstrap on mismatch.
created_at: "2026-05-06T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 21
  risk_score: medium

tldr: |
  Four-wave refactor of the experiment workflow. Wave 1 extracts 6 inline
  shell/Python heredoc blocks from experiment.yml into versioned Python
  subcommands (init-state, format-output, terminalize, replenish-state-update)
  and two thin .sh helpers (check_labeler.sh, check_queue_depth.sh).
  Wave 2 migrates the replenish step from --agent brainstorm to
  --agent edge-architect, extends edge-architect.agent.md with the YAML draft
  contract, and removes brainstorm.agent.md plus all downstream references.
  Wave 3 adds BASELINE_ID to .env.example, documents and wires --local flag
  support in justfile and experiment.py, and makes experiment-submit-spec
  commit the spec file after writing it. Wave 4 embeds git_sha,
  source_experiment_id, and eval_set_version into baseline JSON at promotion
  time and adds staleness detection to ensure_baseline() with auto-re-bootstrap.

open_questions: []

gaps: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        T1.3 replaces inline YAML script blocks but misses an env variable
        reference, causing a workflow step to silently operate on an empty value.
      likelihood: medium
      impact: high
      mitigation: >
        Preserve every env: block variable name verbatim when replacing run:
        blocks. Run python scripts/validate_workflow_security.py after T1.3
        to confirm all security contract checks still pass.
    - scenario: >
        T1.1 and T4.1–T4.3 both modify scripts/experiment.py. If executed
        without awareness of each other, one wave's edits could clobber the
        other's changes.
      likelihood: medium
      impact: medium
      mitigation: >
        Wave 4 is intentionally gated after Wave 1 completes in the DAG.
        Implementers of T4.x must read the latest state of experiment.py
        (post T1.1) before starting. Each task specifies exact function targets.
    - scenario: >
        T2.7 deletes brainstorm.agent.md before T2.4 updates the test import,
        causing an ImportError in test_experiment.py and breaking CI.
      likelihood: low
      impact: medium
      mitigation: >
        T2.7 depends on T2.5 and T2.6; T2.8 depends on both T2.4 and T2.7,
        ensuring the full Wave 2 sequence completes before validation runs.
        Verify grep -r BRAINSTORM tests/ returns no matches before running T2.7.
    - scenario: >
        eval_set_version() hash is non-deterministic across Python versions or
        file ordering, causing spurious baseline re-bootstraps on every run.
      likelihood: low
      impact: high
      mitigation: >
        Explicitly sort file paths before hashing. Use hashlib.sha256 over
        concatenated sorted file contents. Add a determinism unit test that
        calls eval_set_version() twice and asserts identical output.
  assumptions:
    - >
      The workflow step names used as anchors in validate_workflow_security.py
      (e.g. "Terminalize issue and shared state", "Replenish auto-research queue")
      remain unchanged after Wave 1 edits.
    - >
      edge-architect.agent.md already outputs Markdown specs. The YAML draft
      mode is additive — selected by prompt instruction, not by structural change
      to the agent file. The existing spec-writing workflow is unaffected.
    - >
      evals/*.py is the correct and complete glob for the eval case files that
      determine eval_set_version(). Assets under evals/assets/ are not Python
      files and are excluded naturally.
    - >
      scripts/promote_baseline.sh delegates to experiment.py (or just wraps
      cp) and does not need modification in Wave 4 because promote_baseline()
      in experiment.py is the authoritative implementation.

implementation_specification:
  code_structure: >
    Wave 1 centralises complex logic in scripts/experiment.py (four new
    argparse subcommands) and two thin sh helpers under scripts/. The workflow
    run: blocks shrink to single-line delegating calls.
    Wave 2 consolidates agent identity in one file and removes a dead agent.
    Wave 3 adds CLI flags and git plumbing with no new abstractions.
    Wave 4 adds three fields to baseline JSON and staleness detection to two
    existing functions in experiment.py.
  affected_areas:
    - scripts/experiment.py
    - scripts/check_labeler.sh (new)
    - scripts/check_queue_depth.sh (new)
    - .github/workflows/experiment.yml
    - .github/agents/edge-architect.agent.md
    - .github/agents/brainstorm.agent.md (deleted in T2.7)
    - scripts/validate_workflow_security.py
    - tests/test_experiment.py
    - .github/copilot-instructions.md
    - README.md
    - .env.example
    - justfile
  component_details:
    - component: experiment.py subcommands (Wave 1)
      responsibility: >
        Expose init-state, format-output, terminalize, and
        replenish-state-update as argparse subcommands callable from the
        workflow, replacing inline Python heredoc blocks.
      interfaces:
        - "CLI: python scripts/experiment.py <subcommand> [--issue-number N]
          [--state-path PATH] [--status STATUS] [--score N]"
        - "Exit codes: 0 = success, non-zero = failure"
      dependencies:
        - component: existing experiment.py helpers
          relationship: subcommands call load_state, save_state, log, etc.
      integration_points:
        - .github/workflows/experiment.yml run: blocks
    - component: edge-architect YAML draft mode (Wave 2)
      responsibility: >
        When prompted to draft a replenishment issue, output YAML with the
        title/body schema identical to what brainstorm produced.
        Limit to exactly 1 draft per run.
      interfaces:
        - "Output schema: title: experiment: <short title>\nbody: |\n  <body>"
      dependencies:
        - component: .github/workflows/experiment.yml replenish step
          relationship: workflow parses the YAML output
      integration_points:
        - scripts/validate_workflow_security.py draft_contract_matches_workflow_parser()
    - component: baseline staleness metadata (Wave 4)
      responsibility: >
        promote_baseline() embeds git_sha, source_experiment_id, and
        eval_set_version into the baseline JSON at promotion time.
        ensure_baseline() reads those fields and triggers re-bootstrap on
        mismatch. eval_set_version() provides the stable eval-set hash.
      interfaces:
        - "Baseline JSON extra fields: git_sha (str), source_experiment_id (str),
          eval_set_version (str)"
        - "ensure_baseline() signature unchanged; auto-re-bootstraps on mismatch"
        - "eval_set_version() -> str: stable sha256 hex string"
      dependencies:
        - component: eval_set_version()
          relationship: called by both promote_baseline() and ensure_baseline()
      integration_points:
        - tests/test_experiment.py

contracts:
  - from_task: T1.1
    to_task: T1.3
    interface: >
      Python subcommand CLI signatures. The workflow must invoke each
      subcommand with the exact argument names produced by T1.1.
    format: >
      python scripts/experiment.py init-state --issue-number N --state-path PATH
      python scripts/experiment.py format-output --result-path PATH --output-path PATH
      python scripts/experiment.py terminalize --issue-number N --state-path PATH
        --final-status STATUS [--promotion-applied bool] [--commit-pushed bool]
        [--status-comment-id ID]
      python scripts/experiment.py replenish-state-update --state-path PATH
        --replenishment-issue-number N
  - from_task: T1.2
    to_task: T1.3
    interface: >
      Shell script env var interfaces. The workflow passes variables via env:
      blocks using the same names as the original inline scripts.
    format: >
      check_labeler.sh reads: ACTOR, REPO, MAX_RUNS, GH_TOKEN
      check_queue_depth.sh reads: REPO, GH_TOKEN; writes queue_count and
      queue_empty to GITHUB_OUTPUT
  - from_task: T2.1
    to_task: T2.2
    interface: >
      edge-architect YAML draft output schema. The replenish step parser
      (unchanged Python block in the workflow) must accept edge-architect
      output without modification.
    format: "title: experiment: <short title>\nbody: |\n  <body lines>"
  - from_task: T2.2
    to_task: T2.3
    interface: >
      Agent identifier string in the workflow replenish step runCmd block.
      The validator asserts this identifier to confirm migration completion.
    format: "--agent edge-architect (literal string in experiment.yml run: block)"
  - from_task: T2.3
    to_task: T2.4
    interface: >
      Python export name EDGE_ARCHITECT_AGENT_PATH from
      scripts/validate_workflow_security.py.
    format: "from scripts.validate_workflow_security import EDGE_ARCHITECT_AGENT_PATH"
  - from_task: T4.3
    to_task: T4.1
    interface: >
      eval_set_version() callable. promote_baseline() calls it to capture
      the eval-set hash at promotion time.
    format: "def eval_set_version() -> str"
  - from_task: T4.3
    to_task: T4.2
    interface: >
      Same eval_set_version() callable used by ensure_baseline() to compare
      the stored hash against the current eval set.
    format: "def eval_set_version() -> str"

tasks:

  # ── Wave 1: Script extraction ────────────────────────────────────────────

  - id: T1.1
    title: "Add init-state, format-output, terminalize, replenish-state-update subcommands to scripts/experiment.py"
    description: >
      Extend the argparse CLI in scripts/experiment.py with four new
      subcommands that encapsulate logic currently inlined as Python heredoc
      blocks in the workflow.
      init-state: initialise or update the state JSON for an issue (replicates
      the "Initialize experiment state" step logic).
      format-output: write step outputs from a result JSON to GITHUB_OUTPUT
      (replicates the inline Python in "Run Copilot agent" that parses result).
      terminalize: update state, post comment, apply outcome label (replicates
      the large "Terminalize issue and shared state" block).
      replenish-state-update: write replenishment issue number back to state
      (replicates the final Python snippet in the replenish step).
      Each subcommand must accept the same inputs as its corresponding inline
      block and produce the same outputs (file mutations, GITHUB_OUTPUT lines,
      exit codes).
    wave: 1
    agent: gem-implementer
    covers:
      - "concern 1: inline script extraction"
    priority: high
    status: pending
    planning_pass: 1
    flags:
      flaky: false
      retries_used: 0
    dependencies: []
    conflicts_with: []
    context_files:
      - path: scripts/experiment.py
        description: >
          Target file. Study load_state, save_state, log helpers and existing
          argparse structure before adding subcommands.
      - path: .github/workflows/experiment.yml
        description: >
          Source of truth for what each inline Python heredoc currently does;
          read all six inline blocks carefully before writing subcommands.
    estimated_effort: large
    estimated_files: 1
    estimated_lines: 200
    focus_area: "scripts/experiment.py — new subcommand handlers + argparse wiring"
    verification:
      - "python scripts/experiment.py --help lists all 4 new subcommands."
      - "python scripts/experiment.py init-state --help shows expected args."
      - >
        Invoke init-state against a tmp dir with a missing state file and
        confirm the resulting JSON matches the structure written by the
        original inline block.
    acceptance_criteria:
      - "Four subcommands registered: init-state, format-output, terminalize, replenish-state-update."
      - "Each subcommand exits 0 on valid input, non-zero on invalid input."
      - "No existing subcommands, functions, or CLI arguments are modified."
      - "Subcommand CLI signatures are documented in docstrings."
    failure_modes:
      - scenario: >
          Subcommand argument names diverge from what T1.3 will reference in
          the workflow, causing the workflow step to fail with an unrecognised
          argument error.
        likelihood: medium
        impact: high
        mitigation: >
          Document the exact CLI signature for each subcommand in a leading
          docstring and cross-reference with T1.3 before merging.
    tech_stack:
      - "Python 3.13"
      - "argparse (stdlib)"
    test_coverage: null
