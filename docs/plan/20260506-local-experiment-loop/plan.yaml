plan_id: 20260506-local-experiment-loop
objective: >
  Revise the local foreground experiment loop so the public entrypoint is
  `just run-experiment-loop`, hook sets resolve shell scripts from
  hooks/<set>/, example local hooks are included, soft-stop modes can end the
  loop after the current iteration by experiment count or elapsed duration,
  manual kill remains immediate foreground interruption, promotion stays
  strict-improvement-only, commit scope stays whitelisted-only, and baseline
  naming stays explicit to avoid confusing the existing `local` lane with the
  OpenRouter-backed `local_openrouter` lane.
created_at: "2026-05-06T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: medium
tldr: |
  Keep the change minimal and repo-native. Extend the existing `local-loop`
  path in scripts/experiment.py instead of creating a new orchestrator. Make
  `just run-experiment-loop` the public alias while keeping `just
  experiment-loop` as a compatibility alias. Add `--hooks <set>` and resolve
  shell hooks from hooks/<set>/ with basename-only sanitization, repo-root
  anchoring, and fail-fast behavior for traversal or missing sets. Keep
  existing flags and flows such as `--model`, `--prepare-cmd`,
  file-backed draft/title/body inputs, and `--max-iterations` as compatibility
  paths where practical, but prefer `--model-alias`, `--hooks`, and
  `--max-experiments` in docs and examples. Define a minimal hook contract with
  explicit exported env vars and clear non-zero exit handling: generation-hook
  failures abort before checkpointing, completion-hook failures are logged only
  and never affect promotion or final outcome. Add a duration-based soft stop
  that finishes the current iteration before exiting, matching the existing
  iteration-bound stop behavior. Do not infer baseline IDs from model aliases;
  require explicit `--baseline-id` in the public example and keep
  `local_openrouter` explicit for the OpenRouter-backed local lane.
open_questions: []
gaps: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        Hook-set sanitization accepts path separators or traversal-like input,
        allowing execution outside the repo hooks root or silently resolving the
        wrong hook set.
      likelihood: medium
      impact: high
      mitigation: >
        Accept only basename-style set names, reject any path separator or
        traversal attempt, resolve only under the repo hooks root, and fail fast
        when an explicitly requested set does not exist.
    - scenario: >
        The hook contract remains ambiguous, so generation hooks checkpoint
        stale files or completion-hook failures accidentally change promotion or
        outcome handling.
      likelihood: medium
      impact: high
      mitigation: >
        Keep hook execution in scripts/experiment.py, define a two-hook contract
        only (`experiment_generated.sh` before spec checkpointing and
        `experiment_complete.sh` after the iteration outcome is known), export a
        small documented env surface with absolute paths, abort the current
        iteration on generation-hook failure, and treat completion-hook failures
        as logged-only observability failures.
    - scenario: >
        The new duration stop checks fire mid-iteration and leave local state or
        post-run commits half-finished.
      likelihood: medium
      impact: high
      mitigation: >
        Use monotonic time only for a between-iterations stop decision, mirror
        the existing iteration-bound loop behavior, and test that both stop
        modes finish the current iteration before exiting.
    - scenario: >
        Public examples imply that `--model-alias edge_agent_local_openrouter`
        should pair with `--baseline-id local`, causing users to write to the
        wrong baseline lane.
      likelihood: medium
      impact: medium
      mitigation: >
        Keep baseline IDs literal, avoid any automatic mapping from model alias
        to baseline ID, and document the OpenRouter example with explicit
        `--baseline-id local_openrouter`.
  assumptions:
    - >
      scripts/experiment.py remains the owning abstraction for local state,
      promotion, hook execution, and stop decisions.
    - >
      Hook execution remains plain shell scripts under swappable directories in
      hooks/<set>/; no plugin registry, Python hook loader, or workflow adapter
      is added.
    - >
      Hook set names are basename-only identifiers. The implementation rejects
      path separators and traversal-like input, resolves the final directory
      only under the repo hooks root, and fails fast when the requested set is
      missing.
    - >
      `experiment_generated.sh` runs before local spec files are checkpointed so
      it can generate or refresh draft/title/body inputs for the iteration.
    - >
      `experiment_complete.sh` runs after the iteration outcome is known and is
      observational only; it must not alter promotion rules, final outcome
      state, or broaden the git commit scope.
    - >
      Existing compatibility inputs remain supported: `--prepare-cmd` stays
      available where already supported, and the existing file-backed
      draft/title/body flows remain valid entry paths for local iteration input.
    - >
      Manual interruption remains an immediate foreground stop via Ctrl+C or
      kill signals, while count-bound and duration-bound stops are soft stops
      evaluated only after an iteration completes.
    - >
      Baseline naming remains explicit: `local` keeps its existing meaning and
      must not be introduced as a friendly alias for `local_openrouter`.
implementation_specification:
  code_structure: >
    Keep the public surface thin. The justfile exposes the preferred public
    alias and preserves compatibility aliases. scripts/experiment.py owns hook
    sanitization, hook resolution, hook invocation, stop-condition evaluation,
    compatibility handling for existing prepare-cmd and file-input flows, and
    the local-loop state machine. Example hook scripts live under hooks/local/
    and consume a small exported-shell contract with absolute paths. Tests stay
    focused in tests/test_experiment.py and docs stay focused in README.md.
  affected_areas:
    - scripts/experiment.py
    - justfile
    - hooks/local/experiment_generated.sh
    - hooks/local/experiment_complete.sh
    - tests/test_experiment.py
    - README.md
  component_details:
    - component: Local loop command and stop semantics
      responsibility: >
        Extend the existing `local-loop` command with public-preferred aliases
        for model and stop flags, keep existing `--prepare-cmd` and file-backed
        draft/title/body flows working as compatibility paths, add elapsed-duration
        soft-stop support, and keep stop checks between iterations only.
      interfaces:
        - >
          python scripts/experiment.py local-loop [--baseline-id ID]
          [--model-alias ALIAS] [--model ALIAS]
          [--hooks SET] [--prepare-cmd CMD]
          [--draft-path PATH] [--title-path PATH] [--body-path PATH]
          [--max-experiments N] [--max-iterations N]
          [--max-minutes MINUTES] [--dry]
      dependencies:
        - component: run_local_loop_iteration
          relationship: Existing per-iteration owner that should remain the unit
            of completion before any soft stop exits.
      integration_points:
        - scripts/experiment.py
        - experiments/manual.state.json
        - experiments/local_idea_draft.yaml
        - experiments/local_idea_title.txt
        - experiments/local_idea_body.md
    - component: Hook-set shell contract
      responsibility: >
        Resolve `--hooks <set>` to hooks/<set>/ only after basename-only
        sanitization and repo-root anchoring, run a generation hook before spec
        checkpointing, and run a completion hook after the iteration result is
        known with a minimal exported env contract and explicit failure
        handling.
      interfaces:
        - --hooks <set>
        - hooks/<set>/experiment_generated.sh
        - hooks/<set>/experiment_complete.sh
        - EXPERIMENT_HOOK_SET
        - EXPERIMENT_REPO_ROOT
        - EXPERIMENT_BASELINE_ID
        - EXPERIMENT_ITERATION
        - EXPERIMENT_DRAFT_PATH
        - EXPERIMENT_TITLE_PATH
        - EXPERIMENT_BODY_PATH
        - EXPERIMENT_CANDIDATE_PATH
        - EXPERIMENT_STATUS
        - EXPERIMENT_IMPROVED
        - EXPERIMENT_BASELINE_SCORE
        - EXPERIMENT_CANDIDATE_SCORE
      dependencies:
        - component: Local spec files
          relationship: Hooks may generate or refresh draft/title/body files.
        - component: run_experiment() result
          relationship: Completion hook reads outcome metadata only.
      integration_points:
        - hooks/local/experiment_generated.sh
        - hooks/local/experiment_complete.sh
        - experiments/local_idea_draft.yaml
        - experiments/local_idea_title.txt
        - experiments/local_idea_body.md
        - experiments/candidate.md
    - component: Public entrypoint and documentation surface
      responsibility: >
        Make `just run-experiment-loop` the preferred public command, keep
        existing public names as compatibility aliases when practical, and
        document the explicit baseline/model example plus the minimal hook
        contract to avoid lane or hook-resolution confusion.
      interfaces:
        - just run-experiment-loop [args...]
        - just experiment-loop [args...] (compatibility alias)
      dependencies:
        - component: scripts/experiment.py local-loop
          relationship: justfile remains a thin wrapper around the Python owner.
      integration_points:
        - justfile
        - README.md
contracts:
  - from_task: LEL-1
    to_task: LEL-2
    interface: Hook contract for example shell scripts
    format: >
      `--hooks <set>` accepts basename-only set names, rejects path separators
      or traversal-like input, resolves only under the repo hooks root, and
      fails fast if the requested set is missing. Both hooks receive
      `EXPERIMENT_HOOK_SET`, `EXPERIMENT_REPO_ROOT`, `EXPERIMENT_BASELINE_ID`,
      `EXPERIMENT_ITERATION`, `EXPERIMENT_DRAFT_PATH`, `EXPERIMENT_TITLE_PATH`,
      `EXPERIMENT_BODY_PATH`, and `EXPERIMENT_CANDIDATE_PATH`; all exported
      paths are absolute filesystem paths. `experiment_generated.sh` runs before
      spec checkpointing and any non-zero exit aborts the current iteration
      before checkpointing. `experiment_complete.sh` runs after the iteration
      result is known and also receives `EXPERIMENT_STATUS`,
      `EXPERIMENT_IMPROVED`, `EXPERIMENT_BASELINE_SCORE`, and
      `EXPERIMENT_CANDIDATE_SCORE`; any non-zero exit is logged only and must
      not alter promotion, outcome state, or candidate/baseline files.
  - from_task: LEL-1
    to_task: LEL-3
    interface: Local-loop CLI and compatibility validation contract
    format: >
      The loop continues in the foreground until manually interrupted or until a
      soft stop is reached after the current iteration. `--model-alias` is the
      preferred public flag with `--model` retained as a compatibility alias.
      `--max-experiments` is the preferred count-bound flag with
      `--max-iterations` retained as a compatibility alias. `--max-minutes`
      introduces duration-bound soft-stop behavior. Existing `--prepare-cmd`
      and file-backed draft/title/body flows remain valid. Baseline IDs remain
      literal and are never inferred from model aliases.
  - from_task: LEL-2
    to_task: LEL-4
    interface: Public command and example contract
    format: >
      README examples must use `just run-experiment-loop` as the preferred
      entrypoint, document basename-only hook-set names under hooks/<set>/, and
      show the OpenRouter-backed local example with `--model-alias
      edge_agent_local_openrouter --baseline-id local_openrouter`.
