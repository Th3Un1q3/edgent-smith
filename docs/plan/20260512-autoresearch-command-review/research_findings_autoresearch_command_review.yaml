findings:
	- severity: "medium"
		title: "Config auto-discovery is under-specified and can select the wrong alias when multiple configs exist"
		evidence:
			- "/workspace/cli/project_config.py:76 returns sorted(Path.cwd().glob('*<suffix>'))[0] when no explicit path is supplied"
			- "/workspace/cli/main.py:46 and :61 describe this only as 'Defaults to auto-discovery'"
			- "/workspace/tests/test_cli_design.py:77 and /workspace/tests/test_cli_fix.py:224 rely on explicit --config to override an auto-discovered file"
		rationale: "The effective Copilot CLI alias for design/fix/validate depends on file ordering, but neither README nor command help explains the tie-break rule or the ambiguity when multiple config files exist."
		refactor_direction: "One shared config-resolution policy surface with either explicit multi-file erroring or documented deterministic precedence."
	- severity: "medium"
		title: "The repo has two experiment state systems with overlapping terminology, but README documents only one of them"
		evidence:
			- "/workspace/cli/commands/experiment.py:12 uses experiments/registry.state.json for local registry metadata"
			- "/workspace/cli/commands/design.py:13-36 depends on registry count and formatted registry context"
			- "/workspace/scripts/experiment.py:49 and :653 use experiments/<issue>.state.json or manual.state.json for workflow/local-loop execution state"
			- "/workspace/README.md:86-96 documents per-issue runner state but does not describe the registry commands or registry.state.json"
			- "/workspace/tests/test_cli_experiment.py:54 treats the registry lifecycle as a stable contract"
		rationale: "Users can create, start, finish, list, and show registry experiments through the Click CLI, and design depends on that registry, but the primary docs explain only the workflow runner state. This makes the relationship between backlog metadata and execution state implicit rather than user-visible."
		refactor_direction: "Document or consolidate the boundary between registry metadata and runner execution state in a shared state contract."
	- severity: "medium"
		title: "Copilot invocation policy is duplicated across the shared service and the workflow runner"
		evidence:
			- "/workspace/cli/services/copilot_session.py:33 defines PERMISSIVE_TOOLSET with allow_all plus git push/commit/checkout denies"
			- "/workspace/scripts/experiment.py:460-479 hardcodes --allow-all-tools and the same three --deny-tool flags"
			- "/workspace/scripts/experiment.py:514 calls just fix, which routes back through the Click path using CopilotSessionService"
		rationale: "The repo has one logical Copilot tool-permission policy, but it is expressed in two different wrappers. That raises drift risk for security-sensitive flags and behavior changes."
		refactor_direction: "A shared policy/builder seam for Copilot CLI flags, with per-surface session semantics layered on top."
	- severity: "low"
		title: "Legacy-workflow terminology is narrower than the code it appears to describe"
		evidence:
			- "/workspace/cli/commands/design.py:69-71 tells the design agent 'Do not use the legacy candidate-file workflow.'"
			- "/workspace/scripts/experiment.py:21-22 still ships DEFAULT_LOCAL_CANDIDATE_PATH and DEFAULT_LOCAL_STATE_PATH for the local loop"
			- "/workspace/tests/test_cli_design.py:210-211 asserts candidate.md is intentionally excluded from design prompts"
		rationale: "The phrase 'legacy candidate-file workflow' is used inside the design prompt to fence off one creation path, but the repo still supports candidate.md/manual.state.json for local-loop execution. The wording is accurate only if scoped to design creation, not to the repository as a whole."
		refactor_direction: "Scope the terminology to the registry-backed design flow or rename the local-loop path if it is still first-class."
	- severity: "low"
		title: "validate carries an unsurfaced explicit-config abstraction"
		evidence:
			- "/workspace/cli/commands/validate.py:11 accepts config_path"
			- "/workspace/cli/main.py:41-44 exposes validate with no --config option"
			- "/workspace/README.md has no validate command section"
		rationale: "The implementation is structured as if explicit config selection were intended, but the Click wrapper and docs do not surface it. This is a maintenance drift signal more than an immediate user bug."
		refactor_direction: "Either expose validate through the same config-selection convention as design/fix or collapse the unused parameter."
