plan_id: "20260512-autoresearch-command-review"
objective: "Inspect shared modules and adjacent artifacts used by autoresearch commands, identify duplication outside cli, and map mismatches across code, tests, and docs."
focus_area: "autoresearch_command_review"
created_at: "2026-05-12T00:00:00Z"
created_by: "GitHub Copilot GPT-5.4"
status: "completed"
tldr: |
	- The autoresearch surface splits into two command families: Click-based local registry/config commands under cli/ and the workflow/local-loop runner in scripts/experiment.py.
	- Fix execution is no longer duplicated in shell: justfile and scripts/fix_code.sh both route to cli.commands.fix.run_fix, but Copilot invocation policy is still duplicated between cli.services.copilot_session and scripts/experiment.py.
	- Documentation is strongest for the workflow runner and autofix path, but weak for the registry-backed CLI commands, config discovery rules, and the boundary between registry.state.json and per-issue state files.
	- The most concrete drift is terminology and UX around configuration and state: auto-discovery chooses the lexicographically first *.config.toml file, while docs only say "auto-discovery"; README documents per-issue state but not the registry consumed by design.
	- Authoritative Click docs were consulted for current CLI UX expectations around option help, defaults, and prompting.
