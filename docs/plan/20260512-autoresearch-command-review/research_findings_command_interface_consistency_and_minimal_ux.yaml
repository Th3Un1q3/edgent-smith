related_technology_stack:
  languages_used_in_domain:
    - Python
    - Bash
    - Markdown
    - Just
  frameworks_used_in_domain:
    - name: Click
      usage_in_domain: Command declaration, parsing, help text, prompting, and error handling for the public CLI.
  libraries_used_in_domain:
    - name: click.testing.CliRunner
      purpose_in_domain: Interface-level tests for commands and output.
    - name: tomllib
      purpose_in_domain: Parse project and autofix TOML files.
    - name: subprocess
      purpose_in_domain: Invoke GitHub Copilot CLI and workflow hook commands.
  external_apis_used_in_domain:
    - name: GitHub Copilot CLI
      integration_point: CopilotSessionService and init verification use the configured alias to run the external CLI.
related_conventions:
  naming_patterns_in_domain: Public command implementations use run_<command> helpers; registry helpers use _prefixed internal functions; project config uses DEFAULT_* constants.
  structure_of_domain: Command metadata is centralized in cli/main.py, while behavioral logic lives under cli/commands and shared abstractions live under cli/project_config.py and cli/services.
  error_handling_in_domain: Invalid user or state inputs generally raise ClickException; successful flows echo human-readable output, and experiment commands echo pretty-printed JSON.
  testing_in_domain: Each command family has a dedicated CliRunner-based test module; behavior coverage is deeper than help-text coverage.
  documentation_in_domain: README currently documents fix in detail; other public command families rely mainly on code docstrings and tests for discoverability.
related_dependencies:
  internal:
    - component: cli/project_config.py
      relationship_to_domain: Provides config discovery and default CLI alias values for multiple commands.
      direction: outbound
    - component: cli/services/copilot_session.py
      relationship_to_domain: Provides session execution, model selection, toolset flags, and resume/continue behavior.
      direction: outbound
    - component: cli/commands/experiment.py
      relationship_to_domain: Supplies registry count/context to design and owns the nested experiment interface.
      direction: bidirectional
    - component: justfile
      relationship_to_domain: Exposes public wrapper commands for fix and generic autoresearch dispatch.
      direction: inbound
    - component: scripts/fix_code.sh
      relationship_to_domain: Compatibility wrapper around the same fix CLI.
      direction: inbound
  external:
    - name: GitHub Copilot CLI
      purpose_for_domain: Runs the agent-backed design, validate, init verification, and fix remediation flows.
    - name: Click
      purpose_for_domain: Provides the CLI framework semantics referenced by this review.
domain_security_considerations:
  sensitive_areas:
    - area: Autofix permissive tool usage
      location: /workspace/cli/commands/fix.py and /workspace/cli/services/copilot_session.py
      concern: Fix remediation uses the permissive Copilot toolset, so interface-level defaults directly affect how much authority an autofix run receives.
    - area: Project config auto-discovery
      location: /workspace/cli/project_config.py
      concern: Commands that auto-discover the first sorted *.config.toml may act on a different project config than the user expects in multi-config directories.
    - area: Hook command execution
      location: /workspace/cli/commands/fix.py
      concern: Autofix hook commands are shell-split strings taken from TOML and executed as subprocesses.
  authentication_patterns_in_domain: init probes authentication by sending a simple Copilot message after verifying the CLI binary is present; validate, design, and fix assume the configured alias is already authenticated.
  authorization_patterns_in_domain: There is no repo-local authorization layer; authority boundaries are inherited from the configured Copilot CLI and the selected toolset.
  data_validation_in_domain: Click enforces simple types and enumerations at the boundary, while TOML and JSON file loaders perform additional structural validation.
testing_patterns:
  framework: pytest with click.testing.CliRunner
  coverage_areas:
    - init success and failure behavior
    - validate session persistence flow
    - design prompt contents and retry logic
    - fix sequential/parallel behavior and config parsing
    - experiment lifecycle, filters, and sorting
  test_organization: One test module per command family plus a separate Copilot session service module.
  mock_patterns:
    - subprocess.run patched for CLI/session simulation
    - CopilotSessionService.send_message patched for high-level command tests
    - CliRunner.isolated_filesystem used for per-test file state
open_questions:
  - question: Is validate intentionally meant to support explicit config paths only at the implementation layer, or is the missing --config option in the Click command accidental?
    context: run_validate accepts config_path, but cli/main.py exposes no validate option equivalent to design and fix.
    type: research
    affects:
      - cli/main.py
      - cli/commands/validate.py
  - question: Is the zero-exit warning path in validate considered a successful validation, or is it intended only as informational output for humans?
    context: The command name implies pass/fail validation, but the unmatched-secret branch only echoes a warning.
    type: research
    affects:
      - cli/commands/validate.py
      - tests/test_cli_validate.py
  - question: Is init intended primarily for interactive first-run use, or should it remain automatable like the rest of the autoresearch command surface?
    context: init alone uses click.confirm and click.prompt loops when the alias is missing.
    type: research
    affects:
      - cli/main.py
      - cli/commands/init.py
  - question: Is experiment create intentionally optimized for machine callers rather than humans?
    context: The required title and description are both modeled as options and the same syntax is embedded in design prompts.
    type: research
    affects:
      - cli/main.py
      - cli/commands/design.py
      - tests/test_cli_design.py
gaps:
  - area: Subcommand help coverage
    description: Tests cover root autoresearch help, but the reviewed sources do not include dedicated help-output assertions for init, validate, design, fix, or experiment subcommands.
    impact: research_blocker
    affects:
      - tests/test_cli_init.py
      - tests/test_cli_validate.py
      - tests/test_cli_design.py
      - tests/test_cli_fix.py
      - tests/test_cli_experiment.py
  - area: Public user documentation coverage
    description: README documents fix and its flags, but the reviewed docs do not provide equivalent usage guidance for init, validate, design, or experiment.
    impact: research_blocker
    affects:
      - README.md
  - area: Documented config-selection policy
    description: The reviewed docs do not explain auto-discovery ordering or multi-config behavior for commands that load *.config.toml files.
    impact: research_blocker
    affects:
      - cli/project_config.py
      - README.md
