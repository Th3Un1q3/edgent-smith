    - component: Project config loader
      responsibility: Resolves and parses project .config.toml files.
      location: /workspace/cli/project_config.py
      relationship_to_domain: Shapes config-discovery behavior and explicit-path support.
    - component: Copilot session service
      responsibility: Converts command intent into Copilot CLI subprocess invocations.
      location: /workspace/cli/services/copilot_session.py
      relationship_to_domain: Shapes session reuse, model defaults, toolset behavior, and command output/error semantics.
    - component: Experiment registry commands
      responsibility: Persist and query local experiment state as JSON.
      location: /workspace/cli/commands/experiment.py
      relationship_to_domain: Most self-contained and machine-readable command slice.
    - component: just wrappers and legacy shell wrapper
      responsibility: Provide alternative entrypoints into the same Click command surface.
      location: /workspace/justfile and /workspace/scripts/fix_code.sh
      relationship_to_domain: Duplicate and advertise CLI contract outside Click itself.
