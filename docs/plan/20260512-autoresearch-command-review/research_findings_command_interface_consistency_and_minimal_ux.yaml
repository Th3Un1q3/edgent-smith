plan_id: 20260512-autoresearch-command-review
objective: Review Click command interface consistency and minimal UX for autoresearch init, validate, design, fix, and experiment subcommands.
focus_area: command_interface_consistency_and_minimal_ux
created_at: 2026-05-12T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: completed
tldr: |
  - The public Click surface is centralized in cli/main.py, with each command delegating to a run_* implementation in cli/commands/.
  - The experiment registry subcommands are the most internally consistent slice: subcommands are narrow, state-driven, and emit JSON.
  - The config-and-session commands are less consistent: design and fix expose --config, validate supports explicit config internally but does not expose it, and init is the only interactive command.
  - Required input modeling varies across commands: init uses a required option, design uses an optional argument, experiment create uses required options, and experiment start/show/finish use positional IDs.
  - Shared helpers exist for config loading and Copilot session execution, but alias/model/session setup still repeats across commands.
  - User-facing docs are concentrated on fix; init, validate, design, and experiment are lightly documented or undocumented outside code and tests.
research_metadata:
  methodology: semantic_search/grep_search plus targeted file reads and Context7 Click documentation lookup
  scope: Public autoresearch Click command tree, command implementations, tests, shared CLI helpers, just wrappers, and README references
  confidence: high
  coverage: 91
  decision_blockers: 0
  research_blockers: 0
