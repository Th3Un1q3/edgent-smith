patterns_found:
  - category: structure
    pattern: Thin Click layer with run_* delegation
    description: Public command definitions live in cli/main.py and delegate immediately to implementation helpers in cli/commands/.
    examples:
      - file: cli/main.py
        location: cli/main.py:39
        snippet: "def init(name: str) -> None: run_init(name)"
      - file: cli/main.py
        location: cli/main.py:57
        snippet: "def design(...): run_design(brief, config_path=config_path)"
    prevalence: common
  - category: architecture
    pattern: Shared config discovery and session orchestration helpers
    description: Commands reuse load_project_config for .config.toml resolution and CopilotSessionService for subprocess execution.
    examples:
      - file: cli/project_config.py
        location: cli/project_config.py:44
        snippet: "def load_project_config(config_path: str | Path | None = None, *, required: bool)"
      - file: cli/services/copilot_session.py
        location: cli/services/copilot_session.py:83
        snippet: "def send_message(... continue_session: bool = False)"
    prevalence: common
  - category: naming
    pattern: Mixed use of required options and positional arguments for primary inputs
    description: Some primary inputs are required flags, some are positional arguments, and the choice is not uniform across peer commands.
    examples:
      - file: cli/main.py
        location: cli/main.py:38
        snippet: "@click.option('--name', required=True, ...)"
      - file: cli/main.py
        location: cli/main.py:51
        snippet: "@click.argument('brief', required=False)"
      - file: cli/main.py
        location: cli/main.py:110
        snippet: "@click.option('--title', required=True, ...)"
      - file: cli/main.py
        location: cli/main.py:118
        snippet: "@click.argument('experiment_id')"
    prevalence: common
  - category: error_handling
    pattern: ClickException for hard failures, echo for warnings and no-op outcomes
    description: Invalid states generally raise ClickException, but some commands report user-visible warnings or no-op states while still exiting successfully.
    examples:
      - file: cli/commands/experiment.py
        location: cli/commands/experiment.py:124
        snippet: "raise click.ClickException(f\"Experiment '{experiment_id}' does not have a running run.\")"
      - file: cli/commands/validate.py
        location: cli/commands/validate.py:47
        snippet: "click.echo('Validation warning: Agent did not clearly repeat the secret.')"
      - file: cli/commands/fix.py
        location: cli/commands/fix.py:41
        snippet: "No autofix hooks are configured ..."
    prevalence: common
  - category: documentation
    pattern: Public interface details are encoded partly in prompts, tests, and README rather than only in command help
    description: The experiment create invocation is duplicated in the design prompt, the fix interface is documented in README, and tests assert prompt strings directly.
    examples:
      - file: cli/commands/design.py
        location: cli/commands/design.py:62
        snippet: "Create exactly one new experiment with `just autoresearch experiment create --title ... --description ...`."
      - file: README.md
        location: README.md:181
        snippet: "uv run python -m cli autoresearch fix"
      - file: tests/test_cli_design.py
        location: tests/test_cli_design.py:58
        snippet: "assert 'just autoresearch experiment create --title' in prompt"
    prevalence: occasional
