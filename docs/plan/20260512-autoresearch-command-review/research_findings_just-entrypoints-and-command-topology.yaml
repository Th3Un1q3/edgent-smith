plan_id: 20260512-autoresearch-command-review
objective: Inspect the complete surface behind `just autoresearch *` and closely related shortcuts, especially `just fix`, and map routing, duplication, naming drift, and doc/test accuracy.
focus_area: just-entrypoints-and-command-topology
created_at: 2026-05-12T00:00:00Z
created_by: GitHub Copilot GPT-5.4
status: completed
tldr: |
  - `just autoresearch +ARGS` is a thin proxy to the Click `autoresearch` group in `cli/main.py`.
  - `just fix` is a dedicated shortcut to the `autoresearch fix` subcommand, while `scripts/fix_code.sh` remains a compatibility wrapper for the same path.
  - Experiment-related public commands are split between Click registry CRUD commands and a separate argparse runner in `scripts/experiment.py`.
  - README documents `just fix` and `run-experiment*` well, but does not document the full root `autoresearch` command surface.
  - No `AGENTS.md` or `docs/PRD.yaml` file was present in the workspace.
