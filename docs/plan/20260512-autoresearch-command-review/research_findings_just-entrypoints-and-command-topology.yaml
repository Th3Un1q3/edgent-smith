related_conventions:
  naming_patterns_in_domain: Public just recipes use kebab-case; Click subcommands use function names converted to kebab-case; helper implementations use `run_*` names; external experiment script keeps kebab-case argparse subcommands and multiple compatibility flag aliases.
  structure_of_domain: Entry routing is shallow in justfile, deeper in Click for autoresearch, and separate in argparse for experiment runner flows.
  error_handling_in_domain: Click-backed paths primarily raise `click.ClickException`; argparse script returns process status codes and prints JSON or stderr messages.
  testing_in_domain: Routing tests prefer dry-run just rendering, isolated Click runner invocations, and direct justfile string assertions.
  documentation_in_domain: README documents selected just shortcuts; docs/refactor.md is an incomplete review note for the same surface.
