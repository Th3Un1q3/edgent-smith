patterns_found:
  - category: structure
    pattern: justfile recipes are thin proxies into Python entrypoints
    description: Public recipes generally forward arguments to either `python -m cli autoresearch ...` or `scripts/experiment.py ...`
    examples:
      - file: /workspace/justfile
        location: /workspace/justfile:29
        snippet: "fix *ARGS: -> uv run python -m cli autoresearch fix {{ARGS}}"
      - file: /workspace/justfile
        location: /workspace/justfile:78
        snippet: "run-experiment-loop *ARGS: -> uv run python scripts/experiment.py local-loop {{ARGS}}"
    prevalence: common
  - category: architecture
    pattern: command ownership is split by workflow rather than by a single root CLI
    description: Registry CRUD lives under Click, while execution/orchestration flows live under argparse script entrypoints
    examples:
      - file: /workspace/cli/main.py
        location: /workspace/cli/main.py:103
        snippet: "@autoresearch.group() def experiment()"
      - file: /workspace/scripts/experiment.py
        location: /workspace/scripts/experiment.py:839
        snippet: "subparsers = parser.add_subparsers(dest=\"command\", required=True)"
    prevalence: common
  - category: naming
    pattern: compatibility aliases are exposed at multiple layers
    description: just aliases, shell wrapper scripts, and argparse option aliases preserve older surfaces
    examples:
      - file: /workspace/justfile
        location: /workspace/justfile:77
        snippet: "alias experiment-loop := run-experiment-loop"
      - file: /workspace/scripts/experiment.py
        location: /workspace/scripts/experiment.py:845
        snippet: "--engineer-model, --model, --model-alias"
      - file: /workspace/scripts/fix_code.sh
        location: /workspace/scripts/fix_code.sh:1
        snippet: "Compatibility wrapper for legacy callers."
    prevalence: common
  - category: testing
    pattern: just routing is tested via `just --dry-run` or literal justfile inspection
    description: Tests verify rendered command strings rather than invoking the full command path end to end
    examples:
      - file: /workspace/tests/test_cli_fix.py
        location: /workspace/tests/test_cli_fix.py:89
        snippet: "subprocess.run([\"just\", \"--dry-run\", \"fix\", \"--continue\"])"
      - file: /workspace/tests/test_experiment.py
        location: /workspace/tests/test_experiment.py:1125
        snippet: "justfile = (REPO_ROOT / \"justfile\").read_text()"
    prevalence: common
  - category: documentation
    pattern: README emphasizes selected shortcuts rather than the full root CLI topology
    description: README documents `just fix` and external experiment runner entrypoints, but omits the broader Click autoresearch command tree
    examples:
      - file: /workspace/README.md
        location: /workspace/README.md:96
        snippet: "For local or manual runs, the public entrypoint is: just run-experiment ..."
      - file: /workspace/README.md
        location: /workspace/README.md:176
        snippet: "## Autofix workflow"
    prevalence: occasional
