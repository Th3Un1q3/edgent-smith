    to_task: ACR-4
    interface: Command-family terminology contract
    format: >
      Public help and docs use the same boundary language: `autoresearch
      experiment` is registry CRUD only; run-experiment, run-experiment-loop,
      and promote-baseline remain separate script-backed entrypoints.
  - from_task: ACR-1
    to_task: ACR-9
    interface: Public command map contract
    format: >
      README and justfile enumerate only currently shipped `just autoresearch`
      subcommands and existing adjacent just shortcuts; no new commands are
      implied.
  - from_task: ACR-2
    to_task: ACR-9
    interface: State-and-compatibility wording freeze
    format: >
      ACR-2 documents only the current ownership of registry and runner state
      plus supported compatibility surfaces; any wording that reflects changed
      interface behavior is reserved for the final documentation sync.
  - from_task: ACR-3
    to_task: ACR-7
    interface: Config resolution contract
    format: >
      `validate` accepts an optional `--config PATH`; when omitted, config
      resolution still delegates unchanged to load_project_config() and its
      current lexicographic `*.config.toml` fallback.
  - from_task: ACR-4
    to_task: ACR-6
    interface: Stable public help contract
    format: >
      Command names and primary argument shapes remain unchanged while helper
      cleanup is performed behind the existing help surface.
  - from_task: ACR-7
    to_task: ACR-8
    interface: Command-context helper contract
    format: >
      The new command-context helper resolves project config and returns the
      same alias/model/session inputs currently consumed by design and validate,
      so fix can migrate without changing autofix-specific execution semantics.

