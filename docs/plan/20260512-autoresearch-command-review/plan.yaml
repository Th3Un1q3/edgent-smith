plan_id: 20260512-autoresearch-command-review
objective: >
  Produce an incremental refactor plan for the public `just autoresearch *`
  command set that fixes the documented discovery, guidance, and small-surface
  interface issues without collapsing the existing Click-vs-runner split or
  redesigning the workflow architecture.
created_at: "2026-05-12T00:00:00Z"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 11
  risk_score: medium

tldr: |
  Keep the refactor incremental and repo-native. Wave 1 documents the current
  command map so later slices do not have to rediscover ownership boundaries.
  Wave 2 fixes the smallest user-facing problems first: hidden config
  selection in `validate`, unclear registry-vs-runner terminology in help,
  stale `init` installation guidance, and missing documentation for state and
  compatibility surfaces. Wave 3 and the helper-adoption portion of Wave 4 are
  optional deferred cleanup after the core user-facing response lands; if they
  are executed later, they still follow the current helper-first ordering.
  Wave 4 ends with a final docs sync so the public guidance matches the
  stabilized interface.

open_questions: []

gaps:
  - description: >
      No AGENTS.md or docs/PRD.yaml file was present in the workspace, so the
      plan is grounded in docs/refactor.md, the four research_findings YAML
      files for this plan, existing repo memory, and the current code/docs
      surfaces.
    refinement_requests: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        Wave 1 or Wave 2 documentation starts describing a target interface
        instead of the shipped interface, which would make later behavior
        slices harder to validate and could mislead users during the refactor.
      likelihood: medium
      impact: medium
      mitigation: >
        Keep Wave 1 limited to factual topology and ownership language already
        present in code. Reserve any interface-dependent wording for the final
        documentation sync after the behavior slices complete.
    - scenario: >
        Exposing `validate --config` accidentally changes auto-discovery
        semantics instead of only making the existing explicit-path capability
        visible.
      likelihood: medium
      impact: high
      mitigation: >
        Treat cli.project_config.load_project_config() as the owning resolver,
        leave the lexicographic fallback intact, and add focused CLI coverage
        for explicit-path use plus unchanged fallback behavior.
    - scenario: >
        Shared-helper extraction for Copilot policy or command context changes
        runtime arguments in subtle ways and breaks the Click-backed flows or
        the separate experiment runner.
      likelihood: medium
      impact: high
      mitigation: >
        Extract literal helper contracts first, migrate one narrow consumer set
        at a time, and use the existing targeted CLI and runner tests as the
        acceptance gate after each slice.
    - scenario: >
        Help-text cleanup overreaches into command renaming or input-shape
        redesign, which would broaden scope beyond the documented minimal
        refactor goal.
      likelihood: low
      impact: high
      mitigation: >
        Limit interface work to help text, option exposure, and current-package
        guidance. Keep existing command names and positional-vs-option shapes
        intact unless a task explicitly calls for a public syntax change.
  assumptions:
    - >
      The existing command ownership split is retained: `just autoresearch *`
      continues to proxy to Click in cli/main.py, while run-experiment,
      run-experiment-loop, and promote-baseline remain separate just wrappers
      over scripts/experiment.py.
    - >
      `validate` already supports explicit config selection internally, so the
      minimal fix is to expose that capability publicly rather than redesign
      config resolution.
    - >
      The command-shape inconsistency finding is addressed in this plan by
      making the current rules visible in help/docs, not by renaming commands
      or changing primary argument syntax.
    - >
      Compatibility wrappers and aliases remain supported for now; this plan
      only documents them and reduces future drift risk.

implementation_specification:
  code_structure: >
    Keep the public task runner and CLI topology unchanged. Documentation work
    updates README and justfile comments to make the current command map and
    state ownership explicit. Interface work stays small and local in cli/main.py
    and cli/commands/init.py. Internal cleanup uses one helper for Copilot
    tool-policy construction and one helper for repeated config/session setup,
    adopting them incrementally across existing commands rather than creating a
    new command layer.
  affected_areas:
    - README.md
    - justfile
    - cli/main.py
    - cli/commands/init.py
    - cli/commands/design.py
    - cli/commands/fix.py
    - cli/commands/validate.py
    - cli/project_config.py
    - cli/services/copilot_session.py
    - scripts/experiment.py
    - tests/test_cli_init.py
    - tests/test_cli_validate.py
    - tests/test_cli_design.py
    - tests/test_cli_fix.py
    - tests/test_cli_experiment.py
    - tests/test_experiment.py
  component_details:
    - component: Public command discovery surface
      responsibility: >
        Describe the current `just autoresearch *` tree, distinguish it from
        script-backed experiment runner entrypoints, and document the current
        state-store and compatibility boundaries.
      interfaces:
        - README command map and state-ownership sections
        - justfile recipe comments surfaced by `just --list`
      dependencies:
        - component: cli/main.py
          relationship: Supplies the authoritative Click command inventory.
        - component: justfile
          relationship: Supplies the authoritative public `just` entrypoints.
      integration_points:
        - README.md
        - justfile
    - component: Config-backed Click commands
      responsibility: >
        Make config selection and command-family intent explicit without
        changing the overall CLI topology. This includes exposing `validate
        --config`, clarifying auto-discovery semantics, and tightening help
        text around registry-only experiment commands and current input rules.
      interfaces:
        - just autoresearch validate [--config PATH]
        - just autoresearch design [BRIEF] [--config PATH]
        - just autoresearch fix [--config PATH] [flags]
        - just autoresearch experiment <subcommand>
      dependencies:
        - component: cli.project_config.load_project_config
          relationship: Remains the owning config resolver.
        - component: Click command help in cli/main.py
          relationship: Carries the visible contract.
      integration_points:
        - cli/main.py
        - cli/commands/init.py
        - cli/commands/validate.py
        - tests/test_cli_validate.py
        - tests/test_cli_experiment.py
        - tests/test_cli_init.py
    - component: Shared CLI support helpers
      responsibility: >
        Remove the two small duplication points identified by the review:
        Copilot tool-policy construction shared between the Click-backed flows
        and the experiment runner, and repeated config/session setup shared by
        config-backed Click commands.
      interfaces:
        - Shared helper for allow-all plus deny-git tool policy
        - Shared helper for config resolution and CopilotSessionService setup
      dependencies:
        - component: cli/services/copilot_session.py
          relationship: Current owner of one Copilot invocation path.
        - component: scripts/experiment.py
          relationship: Current owner of the parallel raw Copilot invocation path.
        - component: cli/commands/design.py
          relationship: Current repeated setup consumer.
        - component: cli/commands/fix.py
          relationship: Current repeated setup consumer.
        - component: cli/commands/validate.py
          relationship: Current repeated setup consumer.
      integration_points:
        - cli/services/copilot_session.py
        - scripts/experiment.py
        - cli/commands/design.py
        - cli/commands/fix.py
        - cli/commands/validate.py

