patterns_found:
  - category: "structure"
    pattern: "Public command ownership is intentionally split across just, Click, and argparse layers."
    description: "The justfile proxies both to the Click autoresearch tree and to separate experiment-runner script commands; the split is deliberate in code and README."
    examples:
      - file: "justfile"
        location: "justfile:61"
        snippet: "run-experiment prompt *ARGS:"
      - file: "cli/main.py"
        location: "cli/main.py:32"
        snippet: "@cli.group() def autoresearch()"
      - file: "scripts/experiment.py"
        location: "scripts/experiment.py:860"
        snippet: "run_parser = subparsers.add_parser('run', ...)"
    prevalence: "common"
  - category: "documentation"
    pattern: "Documentation is asymmetric: fix is documented as Click-backed, while the broader Click tree is not enumerated in README or justfile help."
    description: "Contributor docs strongly describe just fix and script-backed experiment entrypoints, but not init, validate, design, or registry CRUD as a coherent public tree."
    examples:
      - file: "README.md"
        location: "README.md:176"
        snippet: "## Autofix workflow"
      - file: "README.md"
        location: "README.md:93"
        snippet: "For local or manual runs, the public entrypoint is:"
      - file: "justfile"
        location: "justfile:89"
        snippet: "# Proxy commands to the CLI."
    prevalence: "common"
  - category: "naming"
    pattern: "autoresearch experiment names a registry CRUD surface, not the executable experiment runner surface."
    description: "The Click experiment group manages local registry records, while execution/promotion/loop commands remain in scripts/experiment.py behind separate just recipes."
    examples:
      - file: "cli/main.py"
        location: "cli/main.py:105"
        snippet: "Manage the local experiment registry."
      - file: "scripts/experiment.py"
        location: "scripts/experiment.py:890"
        snippet: "Promote candidate to baseline and annotate with provenance."
    prevalence: "common"
  - category: "error_handling"
    pattern: "Config selection defaults to auto-discovery, but that behavior is only partially exposed at the CLI layer."
    description: "design and fix expose --config help, while validate silently depends on auto-discovery of the lexicographically first config file."
    examples:
      - file: "cli/main.py"
        location: "cli/main.py:55"
        snippet: "help='Path to the project .config.toml file. Defaults to auto-discovery.'"
      - file: "cli/project_config.py"
        location: "cli/project_config.py:87"
        snippet: "discovered_paths = sorted(Path.cwd().glob(...))"
      - file: "cli/commands/validate.py"
        location: "cli/commands/validate.py:15"
        snippet: "No .config.toml file found in the current directory."
    prevalence: "occasional"
  - category: "documentation"
    pattern: "Copilot CLI package/install naming has drifted in one command-owned surface."
    description: "Repository docs and upstream docs now install npm package @github/copilot, but init fallback guidance still tells users to install @github/copilot-cli."
    examples:
      - file: "cli/commands/init.py"
        location: "cli/commands/init.py:44"
        snippet: "npm install -g @github/copilot-cli"
    prevalence: "rare"
