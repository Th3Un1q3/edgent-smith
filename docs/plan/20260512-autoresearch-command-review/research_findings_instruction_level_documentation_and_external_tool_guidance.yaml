plan_id: "20260512-autoresearch-command-review"
objective: "Inspect instruction and documentation surfaces shaping the just autoresearch command set, compare them to the implemented ownership split, and note instruction-level drift."
focus_area: "instruction_level_documentation_and_external_tool_guidance"
created_at: "2026-05-12"
created_by: "GitHub Copilot"
status: "completed"
tldr: |
  - The repository exposes three user-facing command layers: just recipes, the Click autoresearch tree, and argparse-backed experiment runner commands.
  - README and instruction surfaces document fix and the experiment runner well, but do not document the full Click autoresearch tree or its ownership boundary.
  - The strongest concrete drift is init guidance that still points to npm package @github/copilot-cli while current GitHub documentation and the upstream README install @github/copilot.
  - justfile comments are a user-visible discovery surface, but the autoresearch proxy recipe only states generic usage and not the actual subcommand scope.
  - validate relies on hidden lexicographic auto-discovery of *.config.toml files and the current help surface does not expose explicit config selection.
research_metadata:
  methodology: "Repo memory review, targeted grep/read passes across docs and command definitions, and external validation against the just manual, Click docs, GitHub Docs, the github/copilot-cli README, and recent copilot-cli releases."
  scope: "Instruction and documentation surfaces affecting the public just autoresearch surface and adjacent just-owned experiment runner recipes."
  confidence: "high"
  coverage: 91
  decision_blockers: 0
  research_blockers: 0
