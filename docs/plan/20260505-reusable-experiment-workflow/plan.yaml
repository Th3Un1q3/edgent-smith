plan_id: 20260505-reusable-experiment-workflow
objective: Make the reusable experiment workflow failure-safe with explicit baseline bootstrap, minimal durable state, workflow-owned GitHub side effects, narrow queue replenishment, and focused orchestration tests.
created_at: 2026-05-05T18:55:00Z
created_by: GitHub Copilot GPT-5.4
status: pending
research_confidence: medium
plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: medium
tldr: |
  Keep a single Python runner and a single workflow YAML. Add one per-issue
  state sidecar with attempt history, explicit bootstrap and rerun recovery,
  GPT-5 non-interactive Copilot invocation, workflow-owned terminal side
  effects, and one narrow queue-empty replenishment branch using the existing
  brainstorm agent. Do not add a registry or runner-side git rollback.
open_questions: []
gaps:
  - description: No prior research_findings YAML or PRD file exists for this plan; the revision is grounded in the current workflow, runner, justfile, README, brainstorm agent, and existing tests.
    refinement_requests: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: A stale in-flight attempt is resumed incorrectly, causing duplicate promotion or masking a prior crash.
      likelihood: medium
      impact: critical
      mitigation: Persist workflow_run_id and session_name per attempt, mark older nonterminal attempts as crashed on rerun, and always append a fresh attempt.
    - scenario: Promotion succeeds but a later workflow side effect fails, leaving the run in an ambiguous terminal state.
      likelihood: medium
      impact: high
      mitigation: Persist workflow side-effect flags separately and distinguish promotion_failed from post_candidate_failed.
    - scenario: Queue-empty replenishment creates duplicate issues.
      likelihood: low
      impact: medium
      mitigation: Reuse the existing global concurrency group, check queue depth only after terminalization, and create at most one new issue.
  assumptions:
    - The existing brainstorm agent remains the approved architect path for generating new experiment issues.
    - Baseline bootstrap can execute before any Copilot mutation in the same workflow run.
    - The baseline and candidate artifact formats must remain unchanged.
    - A per-issue state sidecar is sufficient because the workflow already serializes runs through a single concurrency group.
implementation_specification:
  code_structure: Keep the current single runner script and single workflow file. Add one per-issue state sidecar in experiments/, one stdout JSON result contract from the runner, and no global registry or git rollback path.
  affected_areas:
    - scripts/experiment.py
    - justfile
    - .github/workflows/experiment.yml
    - scripts/validate_workflow_security.py
    - tests/test_experiment.py
    - tests/test_runner.py
    - README.md
  component_details:
    - component: Experiment runner
      responsibility: Own experiment selection, spec loading, baseline bootstrap, Copilot invocation, retries, score delta computation, and machine-readable result emission.
      interfaces:
        - just run-experiment "<prompt>" [flags]
        - python scripts/experiment.py run --prompt "<prompt>" --baseline-id <id> --issue-number <n> --state-path <path> --workflow-run-id <id>
        - stdout JSON result object consumed by the workflow
      dependencies:
        - component: GitHub Copilot CLI
          relationship: Non-interactive prompt execution with explicit model and resume semantics.
        - component: Eval runner
          relationship: Produces standard baseline and candidate artifacts without changing scoring contracts.
      integration_points:
        - Per-issue state file in experiments/
        - just run-experiment public entrypoint
    - component: Workflow orchestrator
      responsibility: Own event wiring, permissions, concurrency, labels/comments, promotion, final commit/push, timeout/cancellation terminalization, and queue-empty replenishment.
      interfaces:
        - issues.labeled trigger for auto-research
        - Shared state file updates for workflow-owned side effects
      dependencies:
        - component: Experiment runner
          relationship: Consumes runner JSON result and shared state.
        - component: Brainstorm agent
          relationship: Generates one replacement issue only when the queue is empty.
      integration_points:
        - GitHub labels and issue comments
        - just promote-baseline
        - gh issue create for replenishment
    - component: Orchestration test harness
      responsibility: Verify bootstrap ordering, rerun recovery, CLI argument construction, and terminal-state mapping without introducing integration-heavy infrastructure.
      interfaces:
        - pytest unit tests with monkeypatch and tmp_path
      dependencies:
        - component: Experiment runner
          relationship: Validates state transitions and CLI assembly.
        - component: Workflow validator
          relationship: Validates thin workflow wiring and security-sensitive invariants.
      integration_points:
        - tests/test_experiment.py
        - tests/test_runner.py
contracts:
  - from_task: REW-1
    to_task: REW-2
    interface: Runner state and result contract
    format: JSON state file at experiments/<issue_number>.state.json plus one final stdout JSON object containing status, issue_number, baseline_id, attempt, state_path, baseline_score, candidate_score, score_delta, baseline_bootstrapped, and candidate_path.
  - from_task: REW-2
    to_task: REW-3
    interface: Workflow terminal-state mapping
    format: Candidate-ready attempts may be advanced only to promotion_failed, post_candidate_failed, succeeded, timed_out, or cancelled, with workflow side-effect flags persisted alongside the shared state.
  - from_task: REW-1
    to_task: REW-3
    interface: Copilot CLI invocation contract
    format: First prompt uses copilot -p with --agent implement --model gpt-5 --allow-all-tools --no-ask-user --output-format json and a deterministic session name; follow-ups use --resume "<session_name>" instead of blind --continue.
