      root_cause: The current runner keeps no durable orchestration state beyond baseline artifacts, treats missing baseline as score 0 instead of a bootstrap path, uses blind continuation semantics, and couples experiment execution to an unconditional Ollama pull.
      fix_recommendations: Add one per-issue state file with attempt ownership, bootstrap baseline before edits, emit a final JSON result, use explicit GPT-5 non-interactive Copilot commands with named-session resume, and decouple the just entrypoint from Ollama-only setup.
