    acceptance_criteria:
      - When the baseline artifact is missing, the runner bootstraps it before any Copilot edit and preserves the existing baseline file format.
      - The runner records attempt status and workflow_run_id in a per-issue state file and claims stale nonterminal attempts as crashed on rerun.
      - The runner invokes Copilot with non-interactive GPT-5 parameters and resumes retries by explicit session name rather than blind continue semantics.
      - The runner emits one final machine-readable JSON result with status, baseline_score, candidate_score, score_delta, attempt, and state_path.
      - just run-experiment no longer unconditionally depends on pull-ollama-model.
    failure_modes:
      - scenario: A fresh rerun accidentally mutates an active attempt instead of creating a new one.
