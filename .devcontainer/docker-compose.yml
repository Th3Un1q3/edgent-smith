version: "3.9"

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.13
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    env_file:
      - ../.env
    environment:
      DEVCONTAINER: "true"
      # The sandbox uses a TLS-intercepting proxy whose CA is trusted by the
      # system store but not by certifi.  Point Python's SSL layer at the
      # system CA bundle so that httpx/openai can verify the proxy's cert.
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      OLLAMA_BASE_URL: http://ollama:11434/v1
    depends_on:
      - ollama
    networks:
      - edgent-dev

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - edgent-dev

networks:
  edgent-dev:

volumes:
  ollama_data:
