version: "3.9"

services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:noble
    volumes:
      - ..:/workspace:cached
      - opencode_data:/home/vscode/.local/share/opencode
    command: sleep infinity
    env_file:
      - ../.env
    environment:
      DEVCONTAINER: "true"
      # The sandbox uses a TLS-intercepting proxy whose CA is trusted by the
      # system store but not by certifi.  Point Python's SSL layer at the
      # system CA bundle so that httpx/openai can verify the proxy's cert.
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      JAEGER_QUERY_URL: http://jaeger:16686
      JAEGER_UI_URL: http://localhost:16686
    networks:
      - edgent-dev

  mcp_gateway:
    image: docker/mcp-gateway:dind
    profiles: ["infra"]
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - ../mcp/catalog.yaml:/mcp/catalog.yaml:ro
      - ../mcp/docker-config.json:/root/.docker/config.json:ro
    secrets:
      - mcp_creds
    command:
      - --transport=streaming
      - --catalog=/mcp/catalog.yaml  
      # - --enable-all-servers  
      - --port=8080
      - --secrets=/run/secrets/mcp_creds
    networks:
      - edgent-dev
    develop:
      watch:
        - path: ../mcp
          action: restart
    restart: always

  ollama:
    image: ollama/ollama:latest
    profiles: ["infra"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - edgent-dev


  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    profiles: ["infra"]
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - edgent-dev

  serena:
    image: ghcr.io/oraios/serena:latest
    profiles: ["infra"]
    command:
      - "serena"
      - "start-mcp-server"
      - "--transport"
      - "streamable-http"
      - "--port"
      - "9121"
      - "--host"
      - "0.0.0.0"
      - "--project"
      - "/workspaces/projects/edgent_smith"
    volumes:
      - ..:/workspaces/projects/edgent_smith:cached
      # - ../serena_config.yml:/etc/serena/serena_config.yml:ro
    networks:
      - edgent-dev

networks:
  edgent-dev:

volumes:
  ollama_data:
  opencode_data:

secrets:
  mcp_creds:
    file: ../secrets/mcp_creds
