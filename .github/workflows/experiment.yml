name: Auto-Research

# Triggered when an issue receives the 'auto-research' label.
#
# Lifecycle:
#   1. Create an experiment branch.
#   2. On the host runner: install GitHub Copilot CLI, invoke it with the
#      implement agent instructions + issue context. Copilot edits files
#      directly using its native file-write and shell tools.
#   3. Inside the DevContainer: validate (tests + lint) and run the
#      pydantic_evals smoke suite; write eval_result.json.
#   4. Compare score to evals/baseline.json.
#      ✅ score >= baseline → commit, push, open PR, comment on issue.
#      ❌ score <  baseline → comment on issue with details; no PR.
#
# Required secrets:
#   COPILOT_GITHUB_TOKEN — fine-grained PAT with "Copilot Requests" permission.
#   See: https://github.com/settings/personal-access-tokens/new

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-research:
    name: Run auto-research experiment
    if: github.event.label.name == 'auto-research'
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Create experiment branch ────────────────────────────────────────
      - name: Create experiment branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '-' \
            | sed 's/-*$//' \
            | cut -c1-40)
          BRANCH="auto-research/${ISSUE_NUMBER}-${SLUG}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 3. Install GitHub Copilot CLI ──────────────────────────────────────
      # ubuntu-latest ships with Node.js 22; no extra setup needed.
      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      # ── 4. Run Copilot implement agent ─────────────────────────────────────
      # Uses the programmatic interface (-p / --prompt) with --allow-all-tools
      # so Copilot can read and write files without interactive prompts.
      # git push and commit are denied — the workflow handles those itself.
      # COPILOT_GITHUB_TOKEN must be a fine-grained PAT with "Copilot Requests"
      # permission. See the repository README for setup instructions.
      - name: Run Copilot implement agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q .title)
          ISSUE_BODY=$(gh issue view  "$ISSUE_NUMBER" --json body  -q .body)

          PROMPT="$(cat .github/agents/implement.agent.md)

## Task: Issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}

${ISSUE_BODY}"

          copilot \
            --model gpt-5-mini \
            --prompt "$PROMPT" \
            --allow-all-tools \
            --deny-tool='shell(git push)' \
            --deny-tool='shell(git commit)' \
            --deny-tool='shell(git checkout)'

      # ── 5. Validate + evaluate inside DevContainer ─────────────────────────
      - name: Run tests and evaluations
        uses: devcontainers/ci@v0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          runCmd: |
            set -euo pipefail
            pip install -e ".[dev]" -q

            # Pull the Ollama model (sidecar started via docker-compose)
            ollama pull "$EDGENT_MODEL_NAME" 2>/dev/null || true

            # Validate changes
            python -m pytest tests/ -q
            python -m ruff check agents/ evals/ tests/

            # Run evaluations; write score report
            python evals/smoke.py --score-file eval_result.json

      # ── 6. Read results ────────────────────────────────────────────────────
      - name: Read eval results
        id: results
        run: |
          SCORE=$(python3 -c \
            "import json; print(json.load(open('eval_result.json'))['score'])")
          BASELINE=$(python3 -c \
            "import json; print(json.load(open('evals/baseline.json'))['score'])")
          python3 -c "import sys; sys.exit(0 if float('$SCORE') >= float('$BASELINE') else 1)" \
            && PASSED=true || PASSED=false
          echo "score=$SCORE"       >> "$GITHUB_OUTPUT"
          echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"

      # ── 7a. Score >= baseline → commit, push, PR ──────────────────────────
      - name: Commit, push, and open PR
        if: steps.results.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BRANCH: ${{ steps.branch.outputs.name }}
          BASE: ${{ github.event.repository.default_branch }}
          SCORE: ${{ steps.results.outputs.score }}
          BASELINE: ${{ steps.results.outputs.baseline }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet \
            || git commit -m "experiment: issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "experiment: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

**Eval score:** \`${SCORE}\`  **Baseline:** \`${BASELINE}\`

Implemented by the [auto-research workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --base "$BASE" \
            --head "$BRANCH")

          gh issue comment "$ISSUE_NUMBER" --body "✅ **Experiment passed baseline.**

| Metric   | Value |
|----------|-------|
| Score    | \`${SCORE}\` |
| Baseline | \`${BASELINE}\` |
| PR       | ${PR_URL} |

The changes have been committed and a pull request has been opened for review."

      # ── 7b. Score < baseline → comment failure details ─────────────────────
      - name: Report below-baseline result
        if: steps.results.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SCORE: ${{ steps.results.outputs.score }}
          BASELINE: ${{ steps.results.outputs.baseline }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "❌ **Experiment did not reach baseline.**

| Metric   | Value |
|----------|-------|
| Score    | \`${SCORE}\` |
| Baseline | \`${BASELINE}\` |
| Run      | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |

Please review the hypothesis and consider refining the approach before re-labelling."
