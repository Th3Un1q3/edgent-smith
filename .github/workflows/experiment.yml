name: Auto-Research

# Triggered when an issue receives the 'auto-research' label.
#
# Lifecycle:
#   1. Create an experiment branch.
#   2. Label the issue `in_progress` (removed unconditionally on job exit).
#   3. Inside the DevContainer: invoke the GitHub Copilot CLI (pre-installed
#      via postCreateCommand) with the implement agent instructions + issue
#      context. Copilot edits files directly using its native tools. Then
#      validate (tests + lint) and run the pydantic_evals smoke suite.
#   4. Compare the candidate score to the baseline via the candidate
#      baseline JSON file and `just promote-baseline`.
#      ✅ score >= baseline → label 'experiment-success', commit, push, PR.
#      ❌ score <  baseline → label 'experiment-failure', comment with details.
#      ⏱  job timeout        → label 'experiment-failure', comment "timed out".
#      💥 unexpected error   → label 'experiment-failure', comment with details.
#   5. Remove `in_progress` label (always, regardless of outcome).
#
# Required secrets:
#   COPILOT_GITHUB_TOKEN — fine-grained PAT with "Copilot Requests" permission.
#   See: https://github.com/settings/personal-access-tokens/new

on:
  issues:
    types: [labeled]

# Serialize experiment runs — only one may execute at a time.
# cancel-in-progress: false queues the next run instead of cancelling the
# current one, so no experiment is silently discarded.
concurrency:
  group: auto-research
  cancel-in-progress: false

# Minimal workflow-level permissions; the job expands only what it needs.
permissions:
  contents: read

jobs:
  auto-research:
    name: Run auto-research experiment
    if: github.event.label.name == 'auto-research'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
      packages: write

    env:
      BASELINE_ID: auto_research
    steps:
      # ── 0. Security gate: labeler permission check + rate limit ────────────
      # Ensures the workflow was triggered by a trusted collaborator and that
      # the repository is not being flooded with experiment runs.
      - name: Check labeler permission and rate limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.event.sender.login }}
          REPO: ${{ github.repository }}
          MAX_RUNS: 10
        run: bash scripts/check_labeler.sh

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          ref: auto_research
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into auto_research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main --no-edit

      # ── 2. Mark issue as in-progress ──────────────────────────────────────
      - name: Mark issue in_progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh label create "in_progress" --color e4e669 --description "Experiment is currently running" --force
          gh issue edit "$ISSUE_NUMBER" --add-label "in_progress"

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Initialize experiment state
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p experiments
          uv run python scripts/experiment.py init-state \
            --state-path "experiments/${ISSUE_NUMBER}.state.json" \
            --issue-number "${ISSUE_NUMBER}"

      # ── 4. Implement + validate + evaluate inside DevContainer ────────────
      # Copilot CLI is pre-installed in the devcontainer (postCreateCommand).
      # COPILOT_GITHUB_TOKEN must be a fine-grained PAT with "Copilot Requests"
      # permission. See the repository README for setup instructions.
      - name: Run Copilot agent, tests, and evaluations
        id: experiment
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/th3un1q3/edgent-smith
          env: |
            COPILOT_GITHUB_TOKEN=${{ secrets.COPILOT_GITHUB_TOKEN }}
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            ISSUE_NUMBER=${{ github.event.issue.number }}
            BASELINE_ID=${{ env.BASELINE_ID }}
            WORKFLOW_RUN_ID=${{ github.run_id }}-${{ github.run_attempt }}
          runCmd: |
            set -euo pipefail

            mkdir -p experiments
            if ! gh issue view "$ISSUE_NUMBER" --json body -q .body > "experiments/${ISSUE_NUMBER}.md"; then
              : > "experiments/${ISSUE_NUMBER}.md"
            fi

            STATE_PATH="experiments/${ISSUE_NUMBER}.state.json"
            RESULT_PATH="experiments/${ISSUE_NUMBER}.result.json"
            PROMPT="Please read experiments/${ISSUE_NUMBER}.md for the full issue body. Perform described experiment end to end."

            set +e
            timeout --signal=TERM 25m just run-experiment "${PROMPT}" \
              --followup-limit 1 \
              --agent implement \
              --baseline-id "${BASELINE_ID}" \
              --issue-number "${ISSUE_NUMBER}" \
              --state-path "${STATE_PATH}" \
              --workflow-run-id "${WORKFLOW_RUN_ID}" > "${RESULT_PATH}"
            runner_exit=$?
            set -e

            echo "runner_exit=${runner_exit}" >> "$GITHUB_OUTPUT"
            echo "state_path=${STATE_PATH}" >> "$GITHUB_OUTPUT"

            if [[ "${runner_exit}" -eq 124 ]]; then
              echo "status=timed_out" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ ! -s "${RESULT_PATH}" ]]; then
              echo "::error::Experiment runner did not emit result JSON."
              exit 1
            fi

            runner_status=$(python3 scripts/format_experiment_output.py "${RESULT_PATH}" "$GITHUB_OUTPUT")

            if [[ "${runner_exit}" -ne 0 && "${runner_status}" != "failed" ]]; then
              echo "::error::Experiment runner exited ${runner_exit} with unexpected status '${runner_status}'."
              exit "${runner_exit}"
            fi

      

      - name: Promote candidate baseline
        id: promotion
        if: steps.experiment.outputs.status == 'candidate_ready'
        continue-on-error: true
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/th3un1q3/edgent-smith
          env: |
            BASELINE_ID=${{ env.BASELINE_ID }}
          runCmd: |
            set -euo pipefail
            just promote-baseline "${BASELINE_ID}"

      - name: Commit and push changes
        id: commit_push
        if: steps.promotion.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if ! git diff --cached --quiet; then
            git commit -m "experiment: issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"
          fi
          git push origin HEAD

      - name: Terminalize issue and shared state
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/terminalize_experiment.py \
            --issue-number "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --state-path "${{ steps.experiment.outputs.state_path || format('experiments/{0}.state.json', github.event.issue.number) }}" \
            --job-cancelled "${{ cancelled() }}" \
            --experiment-status "${{ steps.experiment.outputs.status || '' }}" \
            --baseline-score "${{ steps.experiment.outputs.baseline_score || '' }}" \
            --candidate-score "${{ steps.experiment.outputs.candidate_score || '' }}" \
            --score-delta "${{ steps.experiment.outputs.score_delta || '' }}" \
            --promotion-outcome "${{ steps.promotion.outcome || 'skipped' }}" \
            --commit-push-outcome "${{ steps.commit_push.outcome || 'skipped' }}"

      - name: Remove in_progress label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "in_progress" 2>/dev/null || true

      - name: Check queue depth after terminalization
        id: queue_depth
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: bash scripts/check_queue_depth.sh

      - name: Replenish auto-research queue
        id: replenish_queue
        if: always() && steps.queue_depth.outputs.queue_empty == 'true'
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/th3un1q3/edgent-smith
          env: |
            COPILOT_GITHUB_TOKEN=${{ secrets.COPILOT_GITHUB_TOKEN }}
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            STATE_PATH=experiments/${{ github.event.issue.number }}.state.json
            REPO=${{ github.repository }}
          runCmd: |
            set -euo pipefail

            mkdir -p experiments
            DRAFT_PATH="experiments/replenishment_issue_draft.yaml"
            TITLE_PATH="experiments/replenishment_issue_title.txt"
            BODY_PATH="experiments/replenishment_issue_body.md"
            rm -f "${DRAFT_PATH}" "${TITLE_PATH}" "${BODY_PATH}"

            PROMPT=$(cat <<'EOF'
            Inspect the current edge agent and evaluation suite, then draft exactly one new experiment issue because the auto-research queue is empty.

            Return only YAML. Do not return shell, markdown fences, or gh commands.
            Use exactly this schema:
            title: experiment: <short title>
            body: |
              <issue body markdown>
            EOF
            )

            copilot -p "${PROMPT}" --agent edge-architect --model gpt-5 --allow-all-tools --no-ask-user > "${DRAFT_PATH}"

            python3 scripts/parse_draft.py "${DRAFT_PATH}" "${TITLE_PATH}" "${BODY_PATH}"

            draft_title=$(tr -d '\r' < "${TITLE_PATH}")
            issue_url=$(gh issue create \
              --repo "$REPO" \
              --title "${draft_title}" \
              --label "auto-research" \
              --body-file "${BODY_PATH}")

            replenishment_issue_number=$(uv run python scripts/experiment.py update-replenishment-state \
              --state-path "${STATE_PATH}" \
              --issue-url "${issue_url}")

            echo "replenishment_issue_number=${replenishment_issue_number}" >> "$GITHUB_OUTPUT"
