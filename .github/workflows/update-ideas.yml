name: Update Ideas (fallback)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 httpx

      - name: Run update script
        run: python scripts/update_ideas.py
