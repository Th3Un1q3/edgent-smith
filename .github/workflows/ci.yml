name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  prebuild-devcontainer:
    name: Prebuild DevContainer Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo ".env created from .env.example"
          else
            echo ".env already exists, skipping"
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-build and push devcontainer image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/th3un1q3/edgent-smith
          cacheFrom: ghcr.io/th3un1q3/edgent-smith
          push: always

  ci:
    name: Lint · Type-check · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo ".env created from .env.example"
          else
            echo ".env already exists, skipping"
          fi

      # Run everything inside the existing DevContainer – no separate Python setup.
      - uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/th3un1q3/edgent-smith
          runCmd: |
            echo "── lint ──────────────────────────────────────────"
            just lint
            echo "── typecheck ─────────────────────────────────────"
            just typecheck
            echo "── test ──────────────────────────────────────────"
            just test
