name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Type-check · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo ".env created from .env.example"
          else
            echo ".env already exists, skipping"
          fi

      # Run everything inside the existing DevContainer – no separate Python setup.
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            echo "── ruff ──────────────────────────────────────────"
            uv run ruff check agents/ evals/ tests/
            echo "── mypy ──────────────────────────────────────────"
            uv run mypy agents/ evals/
            echo "── pytest ────────────────────────────────────────"
            uv run pytest tests/ -q
