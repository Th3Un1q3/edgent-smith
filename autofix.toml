# The autofix workflow is fully defined by these hooks and runs in file order.
#
# Example:
# [[hooks]]
# name = "smoke"
# command = "just validate"
# remediation_prompt = "Validation failed with this error: ${hook_output}. Find the most non breaking way to fix it. To re-run use just validate"

[[hooks]]
name = "format"
command = "just format"
remediation_prompt = "Formatting failed. Find the most non breaking way to fix the issue. To re-run formatting use just format."

[[hooks]]
name = "lint"
command = "just lint"
remediation_prompt = "Lint failed. Find the most non breaking way to fix the issue. To re-run lint use just lint."

[[hooks]]
name = "typecheck"
command = "just typecheck"
remediation_prompt = "Type checking failed. Find the most non breaking way to fix the issue. To re-run type checking use just typecheck."

[[hooks]]
name = "test"
command = "just test"
remediation_prompt = "Tests failed. Find the most non breaking way to fix the failure. Consider what caused the tests to fail, either there is an underlying error in implementation or in rare case it's a test itself tests a wrong thing. Re-run tests use `just test`."

